; PlatformIO Project Configuration File
; Smart Fire Fighting System (SFFS) - ESP32 38-Pin DevKit

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    adafruit/Adafruit Unified Sensor @ ^1.1.14   ; required by the DHT library
    adafruit/DHT sensor library @ ^1.4.6
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.4.1
    adafruit/Adafruit PWM Servo Driver Library @ ^3.0.1
    ; ESP32Servo removed — servos driven by the PCA9685 over I2C
    ; Adafruit MPU6050 removed — inertial sensor deleted from the design